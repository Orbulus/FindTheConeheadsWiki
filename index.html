<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wiki</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
width:100vw;
height:100vh;
overflow:hidden;
background:url("wiki-bg.jpg") center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
font-family:'Press Start 2P', monospace;
}

.tablet-wrap{
position:relative;
width:600px;
}

.antenna{
position:absolute;
top:-48px;
right:38px;
display:flex;
flex-direction:column;
align-items:center;
gap:0;
z-index:10;
}

.antenna-ball{
width:22px;
height:22px;
border-radius:50%;
background:radial-gradient(circle at 35% 35%, #ff6060, #cc0000);
box-shadow:0 0 10px rgba(255,0,0,.6), 0 2px 4px rgba(0,0,0,.5);
}

.antenna-stick{
width:5px;
height:34px;
background:linear-gradient(180deg,#555,#333);
border-radius:3px;
box-shadow:inset 1px 0 2px rgba(255,255,255,.1);
}

.panel{
background:linear-gradient(180deg,#23232f,#1a1a24);
border:4px solid #404055;
border-radius:22px;
padding:30px 26px 34px;
box-shadow:
  0 0 0 2px #0d0d14,
  0 0 0 5px #2a2a3a,
  0 16px 60px rgba(0,0,0,.8),
  inset 0 1px 0 rgba(255,255,255,.06),
  inset 0 -2px 0 rgba(0,0,0,.4);
}

.panel-title{
text-align:center;
margin-bottom:26px;
}

.panel-title-bar{
display:inline-block;
background:linear-gradient(180deg,#3a3a52 0%,#252535 100%);
border:2px solid #4e4e6a;
border-radius:30px;
padding:11px 50px;
color:#ccc;
font-size:13px;
letter-spacing:1px;
box-shadow:
  0 2px 8px rgba(0,0,0,.5),
  inset 0 1px 0 rgba(255,255,255,.08),
  inset 0 -1px 0 rgba(0,0,0,.3);
}

.app-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:16px;
}

.app-btn{
background:linear-gradient(180deg,#2a2a3c,#1c1c28);
border:2px solid #38384e;
border-radius:14px;
padding:0;
display:flex;
flex-direction:column;
align-items:stretch;
cursor:pointer;
transition:border-color .15s, transform .1s;
position:relative;
overflow:hidden;
min-height:130px;
box-shadow:
  inset 0 1px 0 rgba(255,255,255,.05),
  0 4px 12px rgba(0,0,0,.4);
}

.app-btn:hover{
border-color:#6060a0;
transform:scale(1.04);
}

.app-btn:active{
transform:scale(.97);
}

.app-icon-wrap{
flex:1;
display:flex;
align-items:center;
justify-content:center;
padding:14px 14px 8px;
}

.app-icon{
width:78px;
height:78px;
object-fit:cover;
border-radius:8px;
display:block;
}

.app-label{
background:rgba(0,0,0,.55);
color:#ddd;
font-size:7.5px;
text-align:center;
padding:7px 6px;
line-height:1.6;
border-top:1px solid rgba(255,255,255,.04);
letter-spacing:.5px;
}

</style>
</head>
<body>

<div class="tablet-wrap">
  <div class="antenna">
    <div class="antenna-ball"></div>
    <div class="antenna-stick"></div>
  </div>

  <div class="panel">
    <div class="panel-title">
      <div class="panel-title-bar">Applications</div>
    </div>
    <div class="app-grid">

      <div class="app-btn">
        <div class="app-icon-wrap">
          <img class="app-icon" src="icon-map.png">
        </div>
        <div class="app-label">Map</div>
      </div>

      <div class="app-btn">
        <div class="app-icon-wrap">
          <img class="app-icon" src="icon-coneheads.png">
        </div>
        <div class="app-label">Coneheads</div>
      </div>

      <div class="app-btn">
        <div class="app-icon-wrap">
          <img class="app-icon" src="icon-airport.png">
        </div>
        <div class="app-label">Coneheadian Airport</div>
      </div>

      <div class="app-btn">
        <div class="app-icon-wrap">
          <img class="app-icon" src="icon-settings.png">
        </div>
        <div class="app-label">Settings</div>
      </div>

      <div class="app-btn">
        <div class="app-icon-wrap">
          <img class="app-icon" src="icon-vouchers.png">
        </div>
        <div class="app-label">Vouchers</div>
      </div>

      <div class="app-btn">
        <div class="app-icon-wrap">
          <img class="app-icon" src="icon-customization.png">
        </div>
        <div class="app-label">Customization</div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
