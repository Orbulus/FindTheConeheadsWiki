<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wiki</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
width:100vw;
height:100vh;
overflow:hidden;
background:url("wiki-bg.png") center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
font-family:'Press Start 2P', monospace;
}

.panel{
background:rgba(20,20,28,.92);
border:3px solid #3a3a4a;
border-radius:18px;
padding:28px 28px 32px;
width:520px;
box-shadow:
  0 0 0 2px #1a1a26,
  0 8px 40px rgba(0,0,0,.7),
  inset 0 1px 0 rgba(255,255,255,.05);
}

.panel-title{
text-align:center;
margin-bottom:24px;
}

.panel-title-bar{
display:inline-block;
background:linear-gradient(180deg,#4a4a6a,#2a2a3e);
border:2px solid #5a5a7a;
border-radius:8px;
padding:10px 36px;
color:#ddd;
font-size:14px;
letter-spacing:1px;
box-shadow:0 2px 8px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.1);
}

.app-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

.app-btn{
background:linear-gradient(180deg,#2e2e42,#1e1e2e);
border:2px solid #3a3a52;
border-radius:12px;
padding:16px 10px 12px;
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
cursor:pointer;
transition:border-color .15s, transform .1s, background .15s;
position:relative;
overflow:hidden;
}

.app-btn::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(180deg,rgba(255,255,255,.04) 0%,transparent 60%);
border-radius:10px;
pointer-events:none;
}

.app-btn:hover{
border-color:#6a6a9a;
background:linear-gradient(180deg,#3a3a52,#2a2a3e);
transform:scale(1.03);
}

.app-btn:active{
transform:scale(.97);
}

.app-icon{
width:72px;
height:72px;
border-radius:10px;
object-fit:cover;
background:#111;
display:block;
}

.app-icon-placeholder{
width:72px;
height:72px;
border-radius:10px;
background:#111;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
}

.app-label{
color:#e0e0e0;
font-size:8px;
text-align:center;
line-height:1.5;
text-shadow:0 1px 4px rgba(0,0,0,.8);
}

</style>
</head>
<body>

<div class="panel">
  <div class="panel-title">
    <div class="panel-title-bar">Applications</div>
  </div>
  <div class="app-grid">

    <div class="app-btn">
      <img class="app-icon" src="icon-map.png" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="app-icon-placeholder" style="display:none">🗺️</div>
      <div class="app-label">Map</div>
    </div>

    <div class="app-btn">
      <img class="app-icon" src="icon-coneheads.png" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="app-icon-placeholder" style="display:none">🍦</div>
      <div class="app-label">Coneheads</div>
    </div>

    <div class="app-btn">
      <img class="app-icon" src="icon-airport.png" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="app-icon-placeholder" style="display:none">✈️</div>
      <div class="app-label">Coneheadian Airport</div>
    </div>

    <div class="app-btn">
      <img class="app-icon" src="icon-settings.png" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="app-icon-placeholder" style="display:none">⚙️</div>
      <div class="app-label">Settings</div>
    </div>

    <div class="app-btn">
      <img class="app-icon" src="icon-vouchers.png" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="app-icon-placeholder" style="display:none">🎟️</div>
      <div class="app-label">Vouchers</div>
    </div>

    <div class="app-btn">
      <img class="app-icon" src="icon-customization.png" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="app-icon-placeholder" style="display:none">🎨</div>
      <div class="app-label">Customization</div>
    </div>

  </div>
</div>

</body>
</html>
